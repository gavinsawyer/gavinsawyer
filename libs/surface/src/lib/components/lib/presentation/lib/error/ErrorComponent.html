<div class="harness" #htmlDivElement
  (click)="$event.stopPropagation();"
  (keydown)="($event.code !== 'Enter' && $event.code !== 'Escape' && $event.code !== 'Space') || $event.stopPropagation(); onKeydown($event);"
  (keyup)="($event.code !== 'Enter' && $event.code !== 'Escape' && $event.code !== 'Space') || $event.stopPropagation(); onKeyup($event);"
  tabindex="-1">
  <div class="between"><ng-container *ngTemplateOutlet="contentTemplate" /></div>
</div>
<div class="backdrop"></div>

<svg
  viewBox="0 0 1 1"
  xmlns="http://www.w3.org/2000/svg">
  <clipPath
    [attr.id]="wellRoundedDirective.clipPathId"
    clipPathUnits="objectBoundingBox">
    <path [attr.d]="wellRoundedDirective.pathDefinition$()" />
  </clipPath>
  <mask
    [attr.id]="wellRoundedDirective.glassMaskId$()"
    maskContentUnits="userSpaceOnUse"
    maskUnits="userSpaceOnUse">
    <path [attr.d]="wellRoundedDirective.pathDefinition$()" />
  </mask>
</svg>

<ng-template #badgeSymbolTemplate>
  @if (containerDirective.badgeSymbolTemplateRef$(); as badgeSymbolTemplateRef) {<div id="badgeSymbol">
    <ng-container *ngTemplateOutlet="badgeSymbolTemplateRef" />
  </div>}
</ng-template>
<ng-template #contentTemplate>
  <div>
    <div class="harness">
      <div class="between">
        <ng-content />
      </div>
    </div>
  </div>
  <div id="closeControl"
    bowstringHoverTransformingDirective #closeControlHoverTransformingDirective="hoverTransformingDirective"
    bowstringWellRoundedDirective #closeControlWellRoundedDirective="wellRoundedDirective"
    [level]="(wellRoundedDirective.levelInput$() || 1) * 2">
    <button class="harness" #closeControlHtmlButtonElement
      (click)="$event.stopPropagation(); openModel$.set(false);"
      (keydown)="($event.code !== 'Enter' && $event.code !== 'Space') || $event.preventDefault() || $event.stopPropagation();"
      (keyup)="($event.code !== 'Enter' && $event.code !== 'Space') || $event.preventDefault() || $event.stopPropagation() || closeControlHtmlButtonElement.click();"
      (pointerup)="hapticsService.trigger();"
      role="button"
      tabindex="0"
      type="button">
      <div class="between">
        @if (xmarkSymbol$(); as symbol) {<svg
          [attr.viewBox]="'0 0 ' + symbol.viewBoxWidth + ' ' + symbol.viewBoxHeight + ''"
          xmlns="http://www.w3.org/2000/svg">
          <g>
            <rect
              [attr.height]="symbol.viewBoxHeight"
              [attr.width]="symbol.viewBoxWidth"
              opacity="0"
              x="0"
              y="0" />
            @for (path of symbol.paths; track $index) {<path
              [attr.d]="path.definition"
              [attr.fill-opacity]="path.opacity"
              fill="currentColor" />}
          </g>
        </svg>}
      </div>
    </button>

    <svg
      viewBox="0 0 1 1"
      xmlns="http://www.w3.org/2000/svg">
      <clipPath
        [attr.id]="closeControlWellRoundedDirective.clipPathId"
        clipPathUnits="objectBoundingBox">
        <path [attr.d]="closeControlWellRoundedDirective.pathDefinition$()" />
      </clipPath>
      <mask
        [attr.id]="closeControlWellRoundedDirective.glassMaskId$()"
        maskContentUnits="userSpaceOnUse"
        maskUnits="userSpaceOnUse">
        <path [attr.d]="closeControlWellRoundedDirective.pathDefinition$()" />
      </mask>
    </svg>
  </div>
  <ng-container *ngTemplateOutlet="badgeSymbolTemplate" />
</ng-template>
